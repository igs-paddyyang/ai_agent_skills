<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArkBot 智庫助理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .chat-bubble { max-width: 80%; word-wrap: break-word; }
        .chat-bubble pre { background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 8px; overflow-x: auto; }
        .chat-bubble code { font-size: 0.875rem; }
        .status-pulse { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #messages { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🚀</span>
            <div>
                <h1 class="text-lg font-semibold">ArkBot 智庫助理</h1>
                <p class="text-xs text-gray-400" id="conn-status">🔴 未連線</p>
            </div>
        </div>
        <a href="/dashboard" target="_blank"
           class="text-sm text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-1">
            📊 ArkAgent 數據中心
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
        </a>
    </header>

    <!-- Messages -->
    <main id="messages" class="flex-1 overflow-y-auto px-4 py-6 space-y-4">
        <div class="flex justify-start">
            <div class="chat-bubble bg-gray-700 rounded-2xl rounded-tl-sm px-4 py-3 text-sm">
                👋 你好！傳送網址給我，我會幫你獵取並摘要內容。也可以直接跟我聊天。
            </div>
        </div>
    </main>

    <!-- Input -->
    <footer class="bg-gray-800 border-t border-gray-700 px-4 py-3">
        <form id="chat-form" class="flex gap-3 max-w-4xl mx-auto">
            <input id="msg-input" type="text" placeholder="輸入訊息或網址..."
                class="flex-1 bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 text-sm
                       focus:outline-none focus:border-blue-500 placeholder-gray-400"
                autocomplete="off" />
            <button type="submit"
                class="bg-blue-600 hover:bg-blue-500 rounded-xl px-6 py-3 text-sm font-medium
                       transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                id="send-btn">
                發送
            </button>
        </form>
    </footer>

    <script>
    const messages = document.getElementById('messages');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const connStatus = document.getElementById('conn-status');

    let ws = null;
    let statusBubble = null;

    function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/ws/chat`);

        ws.onopen = () => {
            connStatus.textContent = '🟢 已連線';
            sendBtn.disabled = false;
        };

        ws.onclose = () => {
            connStatus.textContent = '🔴 已斷線，3 秒後重連...';
            sendBtn.disabled = true;
            setTimeout(connect, 3000);
        };

        ws.onerror = () => {
            connStatus.textContent = '🔴 連線錯誤';
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);

            if (data.type === 'status') {
                if (!statusBubble) {
                    statusBubble = addBubble('bot', data.content, true);
                } else {
                    statusBubble.innerHTML = `<span class="status-pulse">${escapeHtml(data.content)}</span>`;
                }
            } else if (data.type === 'reply') {
                if (statusBubble) {
                    statusBubble.innerHTML = marked.parse(data.content);
                    statusBubble.classList.remove('status-pulse');
                    statusBubble = null;
                } else {
                    addBubble('bot', data.content, false, true);
                }
                sendBtn.disabled = false;
                input.focus();
            } else if (data.type === 'dashboard_reply') {
                // 儀表板回覆：摘要文字 + 開啟按鈕
                if (statusBubble) {
                    statusBubble.classList.remove('status-pulse');
                    statusBubble.innerHTML = marked.parse(data.content)
                        + `<a href="${data.dashboard_url}" target="_blank" `
                        + `class="inline-block mt-2 bg-blue-600 hover:bg-blue-500 rounded-lg px-4 py-2 text-sm font-medium transition-colors">`
                        + `📊 開啟儀表板</a>`;
                    statusBubble = null;
                } else {
                    const bubble = addBubble('bot', '', false, false);
                    bubble.innerHTML = marked.parse(data.content)
                        + `<a href="${data.dashboard_url}" target="_blank" `
                        + `class="inline-block mt-2 bg-blue-600 hover:bg-blue-500 rounded-lg px-4 py-2 text-sm font-medium transition-colors">`
                        + `📊 開啟儀表板</a>`;
                }
                sendBtn.disabled = false;
                input.focus();
            } else if (data.type === 'error') {
                addBubble('bot', `❌ ${data.content}`);
                statusBubble = null;
                sendBtn.disabled = false;
            }

            messages.scrollTop = messages.scrollHeight;
        };
    }

    function addBubble(role, content, isStatus = false, isMarkdown = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

        const bubble = document.createElement('div');
        bubble.className = role === 'user'
            ? 'chat-bubble bg-blue-600 rounded-2xl rounded-tr-sm px-4 py-3 text-sm'
            : 'chat-bubble bg-gray-700 rounded-2xl rounded-tl-sm px-4 py-3 text-sm';

        if (isStatus) {
            bubble.innerHTML = `<span class="status-pulse">${escapeHtml(content)}</span>`;
        } else if (isMarkdown) {
            bubble.innerHTML = marked.parse(content);
        } else {
            bubble.textContent = content;
        }

        wrapper.appendChild(bubble);
        messages.appendChild(wrapper);
        messages.scrollTop = messages.scrollHeight;
        return bubble;
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

        addBubble('user', text);
        ws.send(JSON.stringify({ type: 'message', content: text }));
        input.value = '';
        sendBtn.disabled = true;
        statusBubble = null;
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            form.dispatchEvent(new Event('submit'));
        }
    });

    connect();
    </script>
</body>
</html>
