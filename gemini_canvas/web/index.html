<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawd Analytics Dashboard</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); transition: all 0.3s ease; }
        .chart-container { position: relative; height: 320px; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        /* 異常脈動動畫 */
        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); border-color: rgba(239, 68, 68, 0.8); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); border-color: rgba(239, 68, 68, 0.5); }
        }
        .pulse-red { animation: pulseRed 2s infinite; background: rgba(254, 242, 242, 0.9); }

        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 fade-in">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Clawd Analytics Dashboard</h1>
                <p class="text-slate-500 mt-1 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span> 系統運行中
                </p>
            </div>
            <div class="flex items-center gap-5">
                <div class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl border border-slate-200 shadow-sm">
                    <span class="text-xs font-bold text-slate-500">實時監控</span>
                    <label class="switch">
                        <input type="checkbox" id="poll-switch" onchange="togglePolling(this)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="flex items-center gap-3">
                    <span id="last-update" class="text-xs text-slate-400 font-medium bg-slate-100 px-3 py-1.5 rounded-full">更新時間: --:--:--</span>
                    <button id="refresh-btn" onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-semibold transition-all shadow-lg shadow-blue-200 active:scale-95 flex items-center gap-2">
                        <svg id="refresh-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        手動重整
                    </button>
                </div>
            </div>
        </header>

        <!-- KPI Grid -->
        <div id="kpi-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

        <!-- Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass-card p-6 rounded-2xl shadow-sm fade-in" style="animation-delay: 0.1s">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-slate-800">用戶與營收趨勢</h2>
                    <div class="flex gap-2 text-xs font-bold">
                        <span class="text-blue-600 bg-blue-50 px-2 py-1 rounded">活躍用戶</span>
                        <span class="text-emerald-600 bg-emerald-50 px-2 py-1 rounded">營收趨勢</span>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="glass-card p-6 rounded-2xl shadow-sm fade-in" style="animation-delay: 0.2s">
                <h2 class="text-lg font-bold text-slate-800 mb-6">業務佔比分析</h2>
                <div class="chart-container flex items-center justify-center">
                    <canvas id="ratioChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="glass-card rounded-2xl shadow-sm overflow-hidden fade-in" style="animation-delay: 0.3s">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-white">
                <h2 class="text-lg font-bold text-slate-800">最近交易紀錄</h2>
                <span class="text-xs font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded">即時同步中</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50 text-slate-400 text-xs font-bold uppercase tracking-wider">
                            <th class="px-6 py-4">交易編號</th>
                            <th class="px-6 py-4">用戶</th>
                            <th class="px-6 py-4">金額</th>
                            <th class="px-6 py-4">狀態</th>
                        </tr>
                    </thead>
                    <tbody id="tx-table-body" class="text-sm text-slate-600 divide-y divide-slate-100 italic font-medium"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let trendChart, ratioChart, pollingInterval;

        async function fetchData(isAuto = false) {
            const btn = document.getElementById('refresh-btn');
            const icon = document.getElementById('refresh-icon');
            if (!isAuto) {
                btn.classList.add('opacity-50', 'pointer-events-none');
                icon.classList.add('animate-spin');
            }

            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                updateDashboard(data);
                document.getElementById('last-update').innerText = `上次同步: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                console.error('Fetch error:', error);
                if (!isAuto) alert('數據連通失敗，請確保 FastAPI 已啟動。');
            } finally {
                if (!isAuto) {
                    btn.classList.remove('opacity-50', 'pointer-events-none');
                    icon.classList.remove('animate-spin');
                }
            }
        }

        function togglePolling(checkbox) {
            if (checkbox.checked) {
                pollingInterval = setInterval(() => fetchData(true), 5000);
                console.log("🚀 自動監控啟動 (5s)");
            } else {
                clearInterval(pollingInterval);
                console.log("🛑 自動監控停止");
            }
        }

        function createGradient(ctx, color) {
            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, color.replace('1)', '0.3)'));
            gradient.addColorStop(1, color.replace('1)', '0.0)'));
            return gradient;
        }

        function updateDashboard(data) {
            // 1. KPI Cards with Anomaly Check
            const kpiGrid = document.getElementById('kpi-grid');
            kpiGrid.innerHTML = data.kpi_cards.map((card, index) => {
                const isAnomaly = card.title === "異常率" && parseFloat(card.value) > 5.0;
                return `
                    <div class="glass-card p-6 rounded-2xl shadow-sm ${isAnomaly ? 'pulse-red' : ''}">
                        <p class="text-sm font-semibold ${isAnomaly ? 'text-red-600' : 'text-slate-500'}">${card.title}</p>
                        <div class="flex items-end justify-between mt-2">
                            <h3 class="text-2xl font-bold ${isAnomaly ? 'text-red-700' : 'text-slate-900'}">${card.value}</h3>
                            <span class="text-xs font-bold px-2 py-1 rounded ${card.trend.startsWith('+') ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                                ${card.trend}
                            </span>
                        </div>
                        ${isAnomaly ? '<p class="text-[10px] mt-2 font-bold text-red-500 animate-pulse">● 偵測到數值異常，請立即排查</p>' : ''}
                    </div>
                `;
            }).join('');

            // 2. Trend Chart with Gradients
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: data.trend_data.map(d => d.date),
                    datasets: [
                        {
                            label: '活躍用戶',
                            data: data.trend_data.map(d => d.users),
                            borderColor: '#2563eb',
                            backgroundColor: createGradient(trendCtx, 'rgba(37, 99, 235, 1)'),
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#fff',
                            pointBorderWidth: 2,
                            yAxisID: 'y'
                        },
                        {
                            label: '營收 ($)',
                            data: data.trend_data.map(d => d.revenue),
                            borderColor: '#10b981',
                            borderWidth: 3,
                            borderDash: [5, 5],
                            tension: 0.4,
                            pointRadius: 0,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { type: 'linear', display: true, position: 'left', grid: { display: false } },
                        y1: { type: 'linear', display: true, position: 'right', grid: { color: '#f1f5f9' } }
                    }
                }
            });

            // 3. Ratio Chart
            const ratioCtx = document.getElementById('ratioChart').getContext('2d');
            if (ratioChart) ratioChart.destroy();
            ratioChart = new Chart(ratioCtx, {
                type: 'doughnut',
                data: {
                    labels: data.category_ratio.map(c => c.name),
                    datasets: [{
                        data: data.category_ratio.map(c => c.value),
                        backgroundColor: ['#2563eb', '#3b82f6', '#60a5fa', '#93c5fd'],
                        borderWidth: 0,
                        hoverOffset: 15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '80%',
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 6, padding: 15, font: { weight: 'bold' } } } }
                }
            });

            // 4. Tables with Zebra Striping (via CSS)
            const tableBody = document.getElementById('tx-table-body');
            tableBody.innerHTML = data.recent_transactions.map((tx, idx) => `
                <tr class="hover:bg-slate-50 transition-colors ${idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/30'}">
                    <td class="px-6 py-4 font-mono text-slate-400">#${tx.id}</td>
                    <td class="px-6 py-4 font-bold text-slate-800">${tx.user}</td>
                    <td class="px-6 py-4 font-black text-blue-600">${tx.amount}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${tx.status === '成功' ? 'bg-emerald-100 text-emerald-700' : tx.status === '處理中' ? 'bg-blue-100 text-blue-700' : 'bg-rose-100 text-rose-700'}">
                            ● ${tx.status}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
